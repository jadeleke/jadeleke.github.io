<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="blog.css">
  <link rel="manifest" href="../manifest.webmanifest">
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <header class="site-header">
    <div class="container nav-bar">
      <a class="brand" href="../index.html">
        <span class="brand-icon">JA</span>
        <span>Joseph Adeleke</span>
      </a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="primary-menu">
        <span class="menu-toggle-box" aria-hidden="true">
          <span class="menu-toggle-line"></span>
          <span class="menu-toggle-line"></span>
          <span class="menu-toggle-line"></span>
        </span>
        <span class="menu-toggle-label">Menu</span>
      </button>
      <nav aria-label="Primary">
        <ul id="primary-menu" class="menu">
          <li><a href="../index.html">Home</a></li>
          <li><a href="../about.html">About</a></li>
          <li><a href="../experience.html">Experience</a></li>
          <li><a href="../education.html">Education</a></li>
          <li><a href="../certificates.html">Certificates</a></li>
          <li><a href="../featured.html">Featured</a></li>
          <li><a href="../projects.html">Projects</a></li>
          <li><a href="../skills.html">Skills</a></li>
          <li><a href="./">Blog</a></li>
          <li><a href="../resume.html">Resume</a></li>
          <li><a href="../contact.html">Contact</a></li>
          <li><button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">A</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="section">
    <div class="container">
      <header class="section-heading">
        <span class="eyebrow">Insights</span>
        <h1 class="section-title">Blog</h1>
        <p class="section-lead">Essays and notes on MLOps, DevOps, Oracle, and Linux.</p>
      </header>

      <div id="blog-list" class="blog-list" aria-live="polite">
        <div class="blog-loading">Loading posts&hellip;</div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2025&ndash;2026 Joseph Adeleke.</p>
    </div>
  </footer>

  <script src="../js/main.js" defer></script>
  <script type="module">
    import { fetchPosts, formatDate } from './blog.js';

    const list = document.getElementById('blog-list');

    fetchPosts().then(posts => {
      if (!posts || posts.length === 0) {
        list.innerHTML = '<p class="muted">No posts yet. Check back soon.</p>';
        return;
      }
      list.innerHTML = posts.map(p => `
        <article class="blog-card">
          <div class="blog-card-meta">
            ${p.tags.length ? `<span class="blog-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</span>` : ''}
            <time datetime="${p.created_at}">${formatDate(p.created_at)}</time>
          </div>
          <h2><a href="post.html?slug=${encodeURIComponent(p.slug)}">${p.title}</a></h2>
          ${p.excerpt ? `<p class="muted">${p.excerpt}</p>` : ''}
          <a class="blog-read-more" href="post.html?slug=${encodeURIComponent(p.slug)}">Read &rarr;</a>
        </article>
      `).join('');
    }).catch(err => {
      list.innerHTML = `<p class="muted">Could not load posts: ${err.message}</p>`;
    });
  </script>
</body>
</html>
